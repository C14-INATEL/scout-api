# ================================
# Scout - Fantasy Game
# ================================

spring.application.name=Scout

# ================================
# H2 - banco em memoria (dev)
# ================================
spring.datasource.url=jdbc:h2:mem:draftaligadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================
# Para usar PostgreSQL em producao,
# comente as configs H2 acima e
# descomente abaixo:
# ================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/draftaliga
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update
# spring.h2.console.enabled=false

# ================================
# Swagger UI
# URL: http://localhost:8080/swagger-ui/index.html
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# Log
# ================================
logging.level.com.balbuena=INFO